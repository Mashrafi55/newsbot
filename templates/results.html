<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sift — Intelligence Briefing</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background-color: #f9f9f9;
    color: #2d3435;
    min-height: 100dvh;
  }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    vertical-align: middle;
  }
  .glass-nav {
    background: rgba(249, 249, 249, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .summary-card {
    background: #ffffff;
    border-radius: 0.75rem;
    padding: 2.5rem;
    box-shadow: 0 8px 32px rgba(45, 52, 53, 0.04);
  }
  .article-card {
    background: #ffffff;
    border-radius: 0.5rem;
    padding: 1.5rem;
    box-shadow: 0 4px 16px rgba(45, 52, 53, 0.03);
    transition: box-shadow 0.2s ease-out, transform 0.2s ease-out;
    text-decoration: none;
    display: block;
    color: inherit;
  }
  .article-card:hover {
    box-shadow: 0 8px 24px rgba(45, 52, 53, 0.08);
    transform: translateY(-2px);
  }
  .topic-chip {
    display: inline-block;
    padding: 0.5rem 1rem;
    background: #ebeeef;
    border-radius: 9999px;
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    color: #5a6061;
    font-weight: 500;
  }
  .bottom-nav {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 9999px;
    padding: 0.5rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    box-shadow: 0 8px 32px rgba(45, 52, 53, 0.08);
    z-index: 50;
  }
  .nav-btn {
    padding: 0.75rem;
    border-radius: 9999px;
    border: none;
    background: transparent;
    color: #adb3b4;
    cursor: pointer;
    transition: all 0.2s ease-out;
    display: flex;
    align-items: center;
  }
  .nav-btn:hover { color: #2d3435; }
  .nav-btn.active {
    background: #2d3435;
    color: #f9f9f9;
  }
  .fade-in {
    opacity: 0;
    animation: fadeIn 0.5s ease-out forwards;
  }
  .fade-in-delay-1 { animation-delay: 0.1s; }
  .fade-in-delay-2 { animation-delay: 0.2s; }
  .fade-in-delay-3 { animation-delay: 0.3s; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .divider-line {
    width: 2rem;
    height: 1px;
    background: rgba(90,96,97,0.2);
  }
  .divider-label {
    font-family: 'Inter', sans-serif;
    font-size: 0.625rem;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: rgba(90,96,97,0.7);
    font-weight: 500;
  }
  .error-state {
    text-align: center;
    padding: 4rem 2rem;
  }
</style>
</head>
<body>

<!-- Top Nav -->
<header class="glass-nav fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16">
  <button onclick="window.location.href='/'" class="p-2 rounded-full hover:bg-black/5 transition-colors">
    <span class="material-symbols-outlined text-[#2d3435]">arrow_back</span>
  </button>
  <h1 style="font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 1.25rem; letter-spacing: -0.04em; color: #2d3435;">Sift</h1>
  <button onclick="window.location.href='/'" class="p-2 rounded-full hover:bg-black/5 transition-colors">
    <span class="material-symbols-outlined text-[#2d3435]">search</span>
  </button>
</header>

<!-- Main Content -->
<main style="padding: 6rem 1.5rem 8rem; max-width: 42rem; margin: 0 auto;" id="mainContent">
  <div style="text-align: center; padding: 4rem 0;">
    <p style="font-family: 'Inter', sans-serif; font-size: 0.75rem; color: #5a6061; letter-spacing: 0.1em; text-transform: uppercase;">Loading...</p>
  </div>
</main>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-btn" onclick="window.location.href='/'">
    <span class="material-symbols-outlined">search</span>
  </button>
  <button class="nav-btn active">
    <span class="material-symbols-outlined">article</span>
  </button>
  <button class="nav-btn">
    <span class="material-symbols-outlined">bookmark</span>
  </button>
</nav>

<script>
  const data = JSON.parse(sessionStorage.getItem('siftResults') || '{}');

  function formatSummary(text) {
    // Split by numbered points or newlines and render as paragraphs
    return text.split('\n').filter(p => p.trim()).map(p => {
      // Remove markdown bold and numbered list prefixes
      const clean = p.replace(/\*\*/g, '').replace(/^\d+\.\s*/, '').trim();
      if (!clean) return '';
      return `<p style="font-family: 'Inter', sans-serif; font-size: 1.125rem; line-height: 1.75; color: #2d3435; font-weight: 300;">${clean}</p>`;
    }).join('');
  }

  function extractTopics(summaryText) {
    // Extract key topics from summary text — words after "topics:" or similar
    const topicMatch = summaryText.match(/(?:topics?|covered)[:\s]+(.+?)(?:\n|$)/i);
    if (topicMatch) {
      return topicMatch[1].split(/[,\n\d\.\-]/).map(t => t.trim()).filter(t => t.length > 2 && t.length < 40);
    }
    return [];
  }

  function render() {
    const main = document.getElementById('mainContent');

    if (!data || data.error) {
      main.innerHTML = `
        <div class="error-state fade-in">
          <span class="material-symbols-outlined" style="font-size: 3rem; color: #adb3b4;">search_off</span>
          <p style="font-family: 'Manrope', sans-serif; font-size: 1.25rem; font-weight: 600; margin-top: 1rem; color: #2d3435;">No results found</p>
          <p style="font-family: 'Inter', sans-serif; font-size: 0.875rem; color: #5a6061; margin-top: 0.5rem;">${data.error || 'Try a different search term'}</p>
          <button onclick="window.location.href='/'" style="margin-top: 2rem; padding: 0.75rem 2rem; background: #2d3435; color: #f9f9f9; border: none; border-radius: 0.25rem; font-family: 'Inter', sans-serif; font-size: 0.875rem; cursor: pointer;">Search Again</button>
        </div>`;
      return;
    }

    const query = data.query || '';
    const summary = data.summary || '';
    const articles = data.articles || [];
    const topics = extractTopics(summary);

    main.innerHTML = `
      <!-- Header -->
      <div style="margin-bottom: 3rem;" class="fade-in">
        <span style="font-family: 'Inter', sans-serif; font-size: 0.625rem; text-transform: uppercase; letter-spacing: 0.2em; color: rgba(90,96,97,0.6); display: block; margin-bottom: 0.75rem;">Intelligence Briefing</span>
        <h1 style="font-family: 'Manrope', sans-serif; font-size: 2rem; font-weight: 800; letter-spacing: -0.04em; color: #2d3435; line-height: 1.1;">${capitalise(query)}</h1>
        <p style="font-family: 'Inter', sans-serif; font-size: 0.75rem; color: #5a6061; margin-top: 0.5rem;">${articles.length} sources · ${new Date().toLocaleDateString('en-GB', {day: 'numeric', month: 'long', year: 'numeric'})}</p>
      </div>

      <!-- AI Summary -->
      <section style="margin-bottom: 3rem;" class="fade-in fade-in-delay-1">
        <div class="summary-card">
          <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-label">The Summary</span>
          </div>
          <div style="display: flex; flex-direction: column; gap: 1.25rem;">
            ${formatSummary(summary)}
          </div>
        </div>
      </section>

      <!-- Topics -->
      ${topics.length > 0 ? `
      <section style="margin-bottom: 3rem;" class="fade-in fade-in-delay-2">
        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-label">Key Topics</span>
        </div>
        <div style="display: flex; flex-wrap: wrap; gap: 0.5rem;">
          ${topics.map(t => `<span class="topic-chip">${t}</span>`).join('')}
        </div>
      </section>` : ''}

      <!-- Headlines -->
      <section style="margin-bottom: 3rem;" class="fade-in fade-in-delay-3">
        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-label">Source Headlines</span>
        </div>
        <div style="display: flex; flex-direction: column; gap: 1rem;">
          ${articles.map(a => `
       <a class="article-card" href="${a.url || '#'}" target="_blank" rel="noopener">
          ${a.image 
  ? `<img src="${a.image}" alt="" style="width:100%; height:180px; object-fit:cover; border-radius:0.375rem; margin-bottom:1rem;" onerror="this.style.display='none'"/>` 
  : `<div style="width:100%; height:120px; background:#f2f4f4; border-radius:0.375rem; margin-bottom:1rem; display:flex; align-items:center; justify-content:center;"><span class="material-symbols-outlined" style="color:#adb3b4; font-size:2rem;">article</span></div>`
}
              <div style="display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem;">
                <div style="flex: 1;">
                  <span style="font-family: 'Inter', sans-serif; font-size: 0.625rem; text-transform: uppercase; letter-spacing: 0.1em; color: #5a6061; display: block; margin-bottom: 0.5rem;">${a.source?.name || 'News'} · ${(a.publishedAt || '').slice(0,10)}</span>
                  <h3 style="font-family: 'Manrope', sans-serif; font-size: 0.9375rem; font-weight: 600; letter-spacing: -0.01em; color: #2d3435; line-height: 1.4;">${a.title || ''}</h3>
                  ${a.description ? `<p style="font-family: 'Inter', sans-serif; font-size: 0.8125rem; color: #5a6061; margin-top: 0.5rem; line-height: 1.5;">${a.description}</p>` : ''}
                </div>
                <span class="material-symbols-outlined" style="color: #adb3b4; font-size: 1rem; flex-shrink: 0; margin-top: 0.25rem;">open_in_new</span>
              </div>
            </a>
          `).join('')}
        </div>
      </section>

      <!-- Back Button -->
      <div style="text-align: center; margin-top: 2rem;">
        <button onclick="window.location.href='/'" style="padding: 0.875rem 2.5rem; background: #2d3435; color: #f9f9f9; border: none; border-radius: 0.25rem; font-family: 'Inter', sans-serif; font-size: 0.8125rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s;" onmouseenter="this.style.opacity='0.8'" onmouseleave="this.style.opacity='1'">
          Search Again
        </button>
      </div>
    `;
  }

  function capitalise(str) {
    return str.charAt(0).toUpperCase() + str.slice(1);
  }

  render();
</script>
</body>
</html>
